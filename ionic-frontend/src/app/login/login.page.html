<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Login on <p style="color: var(--ion-color-primary-tint); display: inline; font-weight: bolder;">NexuStream</p></ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">login</ion-title>
    </ion-toolbar>
  </ion-header>
  <div class="popup-container">
    <ion-card class="popup-card">
      <ion-card-header>
        <ion-card-title>Welcome back!</ion-card-title>
      </ion-card-header>
      <ion-item>
      <ion-input
          type="email"
          fill="solid"
          label="Email"
          labelPlacement="floating"
          helperText="Enter a valid email"
          errorText="Invalid email"
          ngModel
          email
        ></ion-input>
      </ion-item>
      <ion-card-content>
        <ion-button (click)="login()" shape="round" color="primary">Sign In</ion-button>
      </ion-card-content>
    </ion-card>
</div>
</ion-content>
